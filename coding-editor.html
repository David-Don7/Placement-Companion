<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Editor — Placement Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Modern Code Editor Styles */
    .editor-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
    }

    .editor-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .editor-topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      transition: all var(--transition);
    }

    .back-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .problem-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .problem-info h1 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .problem-info .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .editor-topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .solved-badge {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--success);
    }

    .solved-badge.show {
      display: flex;
    }

    /* Main Editor Layout */
    .editor-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Problem Panel */
    .problem-panel {
      width: 45%;
      min-width: 350px;
      max-width: 600px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
    }

    .panel-tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }

    .panel-tab {
      padding: 14px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-light);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
    }

    .panel-tab:hover {
      color: var(--text);
    }

    .panel-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .problem-description {
      color: var(--text);
      line-height: 1.8;
    }

    .problem-description h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 24px 0 12px;
      color: var(--text);
    }

    .problem-description p {
      margin-bottom: 16px;
    }

    .difficulty-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-right: 8px;
    }

    .difficulty-easy { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .difficulty-medium { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .difficulty-hard { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    .topic-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(79, 70, 229, 0.1);
      color: var(--primary);
    }

    .example-box {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      margin: 16px 0;
      border-left: 4px solid var(--primary);
    }

    .example-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .example-content {
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .example-content p {
      margin: 6px 0;
    }

    .example-content strong {
      color: var(--text-light);
    }

    .constraints-list {
      list-style: disc;
      padding-left: 20px;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .constraints-list li {
      margin: 8px 0;
    }

    /* Code Panel */
    .code-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 400px;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .language-select {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      min-width: 140px;
    }

    .editor-tools {
      display: flex;
      gap: 8px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-light);
      cursor: pointer;
      transition: all var(--transition);
    }

    .tool-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Monaco Editor Container */
    .editor-container {
      flex: 1;
      position: relative;
      background: #1e1e1e;
    }

    #monacoEditor {
      width: 100%;
      height: 100%;
    }

    .editor-loading {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .editor-loading.hidden {
      display: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Output Panel */
    .output-panel {
      height: 220px;
      min-height: 150px;
      max-height: 350px;
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .output-tabs {
      display: flex;
      gap: 4px;
    }

    .output-tab {
      padding: 8px 14px;
      font-size: 0.8rem;
      font-weight: 500;
      background: transparent;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-light);
      transition: all var(--transition);
    }

    .output-tab:hover {
      background: var(--border);
    }

    .output-tab.active {
      background: var(--primary);
      color: white;
    }

    .output-status {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .output-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .test-results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .test-result {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg);
    }

    .test-result.passed {
      border-color: var(--success);
      background: rgba(16, 185, 129, 0.05);
    }

    .test-result.failed {
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }

    .test-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .test-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .test-status.passed { color: var(--success); }
    .test-status.failed { color: var(--danger); }

    .test-runtime {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .test-detail {
      margin-top: 10px;
    }

    .test-detail-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .test-detail-value {
      background: var(--bg-card);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-family: 'Fira Code', monospace;
      font-size: 0.8rem;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      border: 1px solid var(--border);
    }

    .custom-input-container {
      padding: 0;
    }

    .custom-input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 12px;
    }

    .custom-input-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    .custom-input-textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px 14px;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      resize: vertical;
    }

    .custom-input-textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    /* Action Bar */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .action-bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .run-status {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .action-bar-right {
      display: flex;
      gap: 12px;
    }

    .btn-run {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-run:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .btn-run:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-submit {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--success);
      color: white;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-submit:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Verdict Badges */
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
    }

    .verdict-accepted { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .verdict-wrong-answer { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .verdict-time-limit-exceeded { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .verdict-runtime-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

    /* Submissions Tab */
    .submissions-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .submission-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
    }

    .submission-item:hover {
      background: var(--border);
    }

    .submission-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .submission-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Panel Resizer */
    .panel-resizer {
      width: 6px;
      cursor: col-resize;
      background: var(--border);
      transition: background var(--transition);
      position: relative;
      flex-shrink: 0;
    }

    .panel-resizer::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 40px;
      background: var(--text-muted);
      border-radius: 2px;
      opacity: 0.5;
      transition: opacity var(--transition);
    }

    .panel-resizer:hover {
      background: var(--primary);
    }

    .panel-resizer:hover::before {
      opacity: 0;
    }

    .panel-resizer:active {
      background: var(--primary);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .editor-layout {
        flex-direction: column;
      }

      .problem-panel {
        width: 100%;
        max-width: none;
        height: 45%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .code-panel {
        min-width: 0;
        height: 55%;
      }

      .panel-resizer {
        display: none;
      }
    }

    /* Keyboard Shortcuts Tooltip */
    .shortcuts-hint {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .shortcuts-hint kbd {
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
      font-size: 0.7rem;
    }

    /* Empty states */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div class="editor-page">
    <!-- Top Bar -->
    <div class="editor-topbar">
      <div class="editor-topbar-left">
        <button class="back-btn" onclick="window.location.href='coding-practice.html'">
          <i class="fa-solid fa-arrow-left"></i> Back
        </button>
        <div class="problem-info">
          <h1 id="problemTitle">Loading...</h1>
          <div class="meta">
            <span id="problemDifficulty">-</span>
            <span>•</span>
            <span id="problemTopic">-</span>
          </div>
        </div>
      </div>
      <div class="editor-topbar-right">
        <span class="solved-badge" id="solvedBadge">
          <i class="fa-solid fa-check-circle"></i> Solved
        </span>
        <span class="shortcuts-hint">
          <kbd>Ctrl</kbd>+<kbd>Enter</kbd> Run | <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Enter</kbd> Submit
        </span>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="editor-layout">
      <!-- Problem Panel -->
      <div class="problem-panel" id="problemPanel">
        <div class="panel-tabs">
          <div class="panel-tab active" data-tab="description">Description</div>
          <div class="panel-tab" data-tab="submissions">Submissions</div>
        </div>

        <!-- Description Tab -->
        <div class="panel-content" id="descriptionTab">
          <div class="problem-description" id="problemDescription">
            <p>Loading problem description...</p>
          </div>

          <h4>Examples</h4>
          <div id="examplesContainer"></div>

          <div id="constraintsSection" style="display: none;">
            <h4>Constraints</h4>
            <ul class="constraints-list" id="constraintsList"></ul>
          </div>
        </div>

        <!-- Submissions Tab -->
        <div class="panel-content" id="submissionsTab" style="display: none;">
          <div class="submissions-list" id="submissionsList">
            <div class="empty-state">
              <i class="fa-solid fa-clock-rotate-left"></i>
              <p>No submissions yet</p>
            </div>
          </div>
        </div>
      </div>

      <div class="panel-resizer" id="panelResizer"></div>

      <!-- Code Panel -->
      <div class="code-panel">
        <div class="editor-header">
          <select class="language-select" id="languageSelect">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
          </select>
          <div class="editor-tools">
            <button class="tool-btn" onclick="resetCode()" title="Reset to template">
              <i class="fa-solid fa-rotate-left"></i>
            </button>
            <button class="tool-btn" onclick="formatCode()" title="Format code">
              <i class="fa-solid fa-align-left"></i>
            </button>
            <button class="tool-btn" onclick="increaseFontSize()" title="Increase font size">
              <i class="fa-solid fa-plus"></i>
            </button>
            <button class="tool-btn" onclick="decreaseFontSize()" title="Decrease font size">
              <i class="fa-solid fa-minus"></i>
            </button>
          </div>
        </div>

        <div class="editor-container">
          <div id="monacoEditor"></div>
          <div class="editor-loading hidden" id="editorLoading">
            <div class="loading-spinner"></div>
          </div>
        </div>

        <!-- Output Panel -->
        <div class="output-panel" id="outputPanel">
          <div class="output-header">
            <div class="output-tabs">
              <button class="output-tab active" data-output="testcases">Test Results</button>
              <button class="output-tab" data-output="custom">Custom Input</button>
            </div>
            <span class="output-status" id="outputStatus"></span>
          </div>

          <div class="output-content" id="testcasesOutput">
            <div class="empty-state">
              <i class="fa-solid fa-play"></i>
              <p>Run your code to see results</p>
            </div>
          </div>

          <div class="output-content" id="customInputTab" style="display: none;">
            <div class="custom-input-container">
              <label class="custom-input-label">
                <input type="checkbox" id="useCustomInput" /> Use custom input
              </label>
              <textarea class="custom-input-textarea" id="customInputText" placeholder="Enter your custom input here..."></textarea>
            </div>
          </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
          <div class="action-bar-left">
            <span class="run-status" id="lastRunStatus"></span>
          </div>
          <div class="action-bar-right">
            <button class="btn-run" onclick="runCode()" id="runBtn">
              <i class="fa-solid fa-play"></i> Run
            </button>
            <button class="btn-submit" onclick="submitCode()" id="submitBtn">
              <i class="fa-solid fa-cloud-arrow-up"></i> Submit
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Monaco Editor Loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    /* ============================================
       MODERN CODE EDITOR LOGIC
       ============================================ */

    // Auth check
    if (!requireAuth()) { /* redirected */ }

    // State
    let editor = null;
    let currentProblem = null;
    let currentLanguage = 'python';
    let templates = {};
    let questionId = null;
    let editorFontSize = 14;

    // Get question ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    questionId = urlParams.get('id');

    if (!questionId) {
      showToast('No problem selected', 'error');
      setTimeout(() => window.location.href = 'coding-practice.html', 1500);
    }

    // Initialize Monaco Editor
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });

    require(['vs/editor/editor.main'], function() {
      // Define custom dark theme
      monaco.editor.defineTheme('modernDark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '6a737d', fontStyle: 'italic' },
          { token: 'keyword', foreground: 'ff79c6' },
          { token: 'string', foreground: 'a5d6ff' },
          { token: 'number', foreground: 'ffab70' },
          { token: 'type', foreground: '79c0ff' },
          { token: 'function', foreground: 'd2a8ff' },
        ],
        colors: {
          'editor.background': '#0d1117',
          'editor.foreground': '#e6edf3',
          'editor.lineHighlightBackground': '#161b22',
          'editorLineNumber.foreground': '#484f58',
          'editorLineNumber.activeForeground': '#e6edf3',
          'editorCursor.foreground': '#58a6ff',
          'editor.selectionBackground': '#264f78',
          'editor.inactiveSelectionBackground': '#264f7855',
          'editorIndentGuide.background': '#21262d',
          'editorIndentGuide.activeBackground': '#30363d',
          'editorBracketMatch.background': '#30363d',
          'editorBracketMatch.border': '#58a6ff'
        }
      });

      // Create editor
      editor = monaco.editor.create(document.getElementById('monacoEditor'), {
        value: '# Loading...',
        language: 'python',
        theme: 'modernDark',
        fontSize: editorFontSize,
        fontFamily: "'Fira Code', 'Consolas', 'Monaco', monospace",
        fontLigatures: true,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        automaticLayout: true,
        tabSize: 4,
        insertSpaces: true,
        wordWrap: 'on',
        lineNumbers: 'on',
        renderWhitespace: 'selection',
        bracketPairColorization: { enabled: true },
        padding: { top: 16, bottom: 16 },
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        roundedSelection: true,
        renderLineHighlight: 'all',
        scrollbar: {
          vertical: 'auto',
          horizontal: 'auto',
          useShadows: false,
          verticalScrollbarSize: 10,
          horizontalScrollbarSize: 10
        }
      });

      // Load problem
      loadProblem();
    });

    // Load Problem
    async function loadProblem() {
      try {
        const response = await fetch(`/api/coding/question/${questionId}`, {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('pc_token')}`
          }
        });

        if (!response.ok) throw new Error('Failed to fetch problem');

        currentProblem = (await response.json()).data;
        templates = currentProblem.boilerplate || {};

        // Update UI
        document.getElementById('problemTitle').textContent = currentProblem.title;
        document.getElementById('problemDifficulty').textContent = capitalize(currentProblem.difficulty);
        document.getElementById('problemTopic').textContent = currentProblem.topic;
        document.title = `${currentProblem.title} — Placement Companion`;

        // Build description
        const diffClass = `difficulty-${currentProblem.difficulty.toLowerCase()}`;
        let descHtml = `
          <div style="margin-bottom: 20px;">
            <span class="difficulty-badge ${diffClass}">${capitalize(currentProblem.difficulty)}</span>
            <span class="topic-badge">${currentProblem.topic}</span>
          </div>
          <p>${currentProblem.description || 'Solve this problem using the code editor.'}</p>
        `;
        document.getElementById('problemDescription').innerHTML = descHtml;

        // Examples
        const examplesContainer = document.getElementById('examplesContainer');
        if (currentProblem.examples && currentProblem.examples.length > 0) {
          examplesContainer.innerHTML = currentProblem.examples.map((ex, i) => `
            <div class="example-box">
              <div class="example-label">Example ${i + 1}</div>
              <div class="example-content">
                <p><strong>Input:</strong> ${escapeHtml(ex.input)}</p>
                <p><strong>Output:</strong> ${escapeHtml(ex.output)}</p>
                ${ex.explanation ? `<p><strong>Explanation:</strong> ${ex.explanation}</p>` : ''}
              </div>
            </div>
          `).join('');
        } else {
          examplesContainer.innerHTML = '<p style="color:var(--text-muted);">No examples available</p>';
        }

        // Constraints
        if (currentProblem.constraints && currentProblem.constraints.length > 0) {
          document.getElementById('constraintsSection').style.display = 'block';
          document.getElementById('constraintsList').innerHTML = currentProblem.constraints
            .map(c => `<li>${c}</li>`).join('');
        }

        // Set initial code template
        setCodeTemplate(currentLanguage);

        // Load submissions
        loadSubmissions();

      } catch (err) {
        console.error('Load problem error:', err);
        showToast('Error loading problem: ' + err.message, 'error');
      }
    }

    // Set Code Template
    function setCodeTemplate(language) {
      currentLanguage = language;

      // Update Monaco language
      const monacoLang = {
        python: 'python',
        javascript: 'javascript',
        java: 'java',
        cpp: 'cpp',
        c: 'c'
      };

      monaco.editor.setModelLanguage(editor.getModel(), monacoLang[language] || 'plaintext');

      // Get template
      let code = templates[language.toLowerCase()] || getDefaultTemplate(language);
      editor.setValue(code);
    }

    function getDefaultTemplate(language) {
      const defaults = {
        python: `def solution():
    """
    Write your solution here.
    """
    pass

# Read input and call solution
if __name__ == "__main__":
    # Example: n = int(input())
    solution()`,

        javascript: `/**
 * Write your solution here.
 */
function solution() {
    // Your code here
}

// Read input from stdin
const readline = require('readline');
const rl = readline.createInterface({
    input: process.stdin,
    output: process.stdout
});

// Process input
solution();`,

        java: `import java.util.*;

public class Solution {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        // Read input
        
        // Call solution
        
        sc.close();
    }
    
    // Write your solution method here
}`,

        cpp: `#include <bits/stdc++.h>
using namespace std;

int main() {
    ios_base::sync_with_stdio(false);
    cin.tie(NULL);
    
    // Read input
    
    // Write your solution here
    
    return 0;
}`,

        c: `#include <stdio.h>
#include <stdlib.h>

int main() {
    // Read input
    
    // Write your solution here
    
    return 0;
}`
      };

      return defaults[language] || '// Write your code here';
    }

    // Run Code
    async function runCode() {
      const code = editor.getValue();
      if (!code.trim()) {
        showToast('Code cannot be empty', 'error');
        return;
      }

      const customInput = document.getElementById('useCustomInput').checked
        ? document.getElementById('customInputText').value
        : null;

      showLoading(true);
      document.getElementById('runBtn').disabled = true;
      document.getElementById('outputStatus').textContent = 'Running...';

      try {
        const response = await fetch('/api/coding/submit', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('pc_token')}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            questionId: currentProblem._id,
            code,
            language: currentLanguage,
            customInput
          })
        });

        if (!response.ok) throw new Error('Execution failed');

        const result = (await response.json()).data;
        displayResults(result.testResults || [], 'run');
        
        const passed = result.testResults?.filter(t => t.passed).length || 0;
        const total = result.testResults?.length || 0;
        document.getElementById('outputStatus').textContent = `${passed}/${total} test cases passed`;

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
        document.getElementById('outputStatus').textContent = 'Run failed';
      } finally {
        showLoading(false);
        document.getElementById('runBtn').disabled = false;
      }
    }

    // Submit Code
    async function submitCode() {
      const code = editor.getValue();
      if (!code.trim()) {
        showToast('Code cannot be empty', 'error');
        return;
      }

      showLoading(true);
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('outputStatus').textContent = 'Submitting...';

      try {
        const response = await fetch('/api/coding/submit', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('pc_token')}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            questionId: currentProblem._id,
            code,
            language: currentLanguage
          })
        });

        if (!response.ok) throw new Error('Submission failed');

        const result = (await response.json()).data;

        if (result.status === 'Accepted') {
          document.getElementById('solvedBadge').classList.add('show');
          showToast('Accepted! Great job!', 'success');
          document.getElementById('outputStatus').innerHTML = `
            <span class="verdict-badge verdict-accepted">
              <i class="fa-solid fa-check"></i> Accepted
            </span>
          `;
        } else {
          showToast(result.status, 'error');
          document.getElementById('outputStatus').innerHTML = `
            <span class="verdict-badge verdict-wrong-answer">
              <i class="fa-solid fa-times"></i> ${result.status}
            </span>
          `;
        }

        displayResults(result.testResults || [], 'submit', result.status);
        loadSubmissions();

      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      } finally {
        showLoading(false);
        document.getElementById('submitBtn').disabled = false;
      }
    }

    // Display Results
    function displayResults(results, type, verdict = null) {
      const container = document.getElementById('testcasesOutput');

      if (!results || results.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-circle-info"></i><p>No test results available</p></div>';
        return;
      }

      container.innerHTML = '<div class="test-results">' + results.map((r, i) => {
        const statusClass = r.passed ? 'passed' : 'failed';
        const icon = r.passed ? 'fa-check' : 'fa-times';

        return `
          <div class="test-result ${statusClass}">
            <div class="test-header">
              <span class="test-status ${statusClass}">
                <i class="fa-solid ${icon}"></i>
                Test Case ${i + 1}
              </span>
              <span class="test-runtime">${r.runtime || 0} ms</span>
            </div>
            <div class="test-detail">
              ${!r.passed ? `
                <div class="test-detail-label">Expected:</div>
                <div class="test-detail-value">${escapeHtml(r.expected || '')}</div>
                <div class="test-detail-label">Your Output:</div>
                <div class="test-detail-value">${escapeHtml(r.actual || '')}</div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('') + '</div>';

      // Switch to test cases tab
      switchOutputTab('testcases');
    }

    // Load Submissions
    async function loadSubmissions() {
      try {
        // This would need to be implemented in the API
        // For now, we'll show a placeholder
        document.getElementById('submissionsList').innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <p>Submission history will appear here</p>
          </div>
        `;
      } catch (err) {
        console.error('Load submissions error:', err);
      }
    }

    // Reset Code
    function resetCode() {
      if (confirm('Reset code to template? Your changes will be lost.')) {
        setCodeTemplate(currentLanguage);
        showToast('Code reset to template', 'info');
      }
    }

    // Format Code
    function formatCode() {
      editor.getAction('editor.action.formatDocument').run();
    }

    // Font Size Controls
    function increaseFontSize() {
      editorFontSize = Math.min(24, editorFontSize + 2);
      editor.updateOptions({ fontSize: editorFontSize });
    }

    function decreaseFontSize() {
      editorFontSize = Math.max(10, editorFontSize - 2);
      editor.updateOptions({ fontSize: editorFontSize });
    }

    // Tab Switching
    document.querySelectorAll('.panel-tab').forEach(tab => {
      tab.addEventListener('click', () => switchPanelTab(tab.dataset.tab));
    });

    function switchPanelTab(tabName) {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.panel-tab[data-tab="${tabName}"]`).classList.add('active');

      document.getElementById('descriptionTab').style.display = tabName === 'description' ? 'block' : 'none';
      document.getElementById('submissionsTab').style.display = tabName === 'submissions' ? 'block' : 'none';
    }

    document.querySelectorAll('.output-tab').forEach(tab => {
      tab.addEventListener('click', () => switchOutputTab(tab.dataset.output));
    });

    function switchOutputTab(tabName) {
      document.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.output-tab[data-output="${tabName}"]`).classList.add('active');

      document.getElementById('testcasesOutput').style.display = tabName === 'testcases' ? 'block' : 'none';
      document.getElementById('customInputTab').style.display = tabName === 'custom' ? 'block' : 'none';
    }

    // Language Select
    document.getElementById('languageSelect').addEventListener('change', (e) => {
      const newLang = e.target.value;
      if (confirm(`Switch to ${newLang}? Your current code will be replaced with the template.`)) {
        setCodeTemplate(newLang);
      } else {
        e.target.value = currentLanguage;
      }
    });

    // Helpers
    function showLoading(show) {
      document.getElementById('editorLoading').classList.toggle('hidden', !show);
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Panel Resizer
    const resizer = document.getElementById('panelResizer');
    const problemPanel = document.getElementById('problemPanel');
    const editorLayout = document.querySelector('.editor-layout');
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      editorLayout.style.pointerEvents = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      e.preventDefault();
      const newWidth = e.clientX;
      if (newWidth > 300 && newWidth < window.innerWidth - 400) {
        problemPanel.style.width = newWidth + 'px';
        // Trigger Monaco editor resize
        if (editor) {
          editor.layout();
        }
      }
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        editorLayout.style.pointerEvents = '';
        // Final layout update for Monaco
        if (editor) {
          editor.layout();
        }
      }
    });

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd + Enter = Run
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        runCode();
      }
      // Ctrl/Cmd + Shift + Enter = Submit
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') {
        e.preventDefault();
        submitCode();
      }
    });
  </script>
</body>
</html>
