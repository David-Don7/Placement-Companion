<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coding Practice — Placement Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .practice-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .filter-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .filter-group {
      margin-bottom: 1.5rem;
    }

    .filter-group:last-child {
      margin-bottom: 0;
    }

    .filter-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .filter-group select {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .filter-tag {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: var(--bg-light);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 0.25rem;
    }

    .filter-tag:hover,
    .filter-tag.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    /* Problem List */
    .problems-container {
      display: grid;
      gap: 1rem;
    }

    .problem-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 1.5rem;
    }

    .problem-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);
      transform: translateY(-2px);
    }

    .problem-info h3 {
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .problem-info p {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }

    .problem-meta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }

    .meta-badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      background: var(--bg-light);
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .meta-badge.easy {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
    }

    .meta-badge.medium {
      background: rgba(245, 158, 11, 0.1);
      color: #f59e0b;
    }

    .meta-badge.hard {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .problem-stats {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .problem-solvedstatus {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.75rem;
    }

    .solved-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, #22c55e, #10b981);
      color: white;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.8rem;
    }

    .action-btn {
      padding: 0.7rem 1.2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: var(--secondary);
      transform: translateY(-2px);
    }

    /* Stats Bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 1.5rem;
      border-radius: var(--radius);
      text-align: center;
    }

    .stat-box-value {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .stat-box-label {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    @media (max-width: 1024px) {
      .practice-layout {
        grid-template-columns: 1fr;
      }

      .filter-panel {
        position: static;
      }

      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .problem-card {
        grid-template-columns: 1fr;
      }

      .problem-solvedstatus {
        align-items: flex-start;
      }

      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <!-- ===== Sidebar ===== -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">🎓</span>
        <span>Placement&nbsp;Companion</span>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Main</div>
        <a href="dashboard.html" class="nav-link">
          <span class="nav-icon"><i class="fa-solid fa-house"></i></span> Dashboard
        </a>
        <a href="aptitude.html" class="nav-link">
          <span class="nav-icon"><i class="fa-solid fa-brain"></i></span> Aptitude
        </a>
        <a href="coding-practice.html" class="nav-link active">
          <span class="nav-icon"><i class="fa-solid fa-code"></i></span> Coding Practice
        </a>
        <a href="hr.html" class="nav-link">
          <span class="nav-icon"><i class="fa-solid fa-comments"></i></span> HR Interview
        </a>
        <a href="companies.html" class="nav-link">
          <span class="nav-icon"><i class="fa-solid fa-building"></i></span> Companies
        </a>
      </div>
      <div class="nav-section">
        <div class="nav-section-title">Account</div>
        <a href="profile.html" class="nav-link">
          <span class="nav-icon"><i class="fa-solid fa-user"></i></span> Profile
        </a>
        <a href="login.html" class="nav-link" id="logoutBtn">
          <span class="nav-icon"><i class="fa-solid fa-right-from-bracket"></i></span> Logout
        </a>
      </div>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- ===== Main Content ===== -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
          <div>
            <h1>DSA & Coding Practice</h1>
            <span class="breadcrumb">Dashboard / Coding Practice</span>
          </div>
        </div>
        <div class="topbar-right">
          <button class="notification-btn"><i class="fa-solid fa-bell"></i><span class="badge">0</span></button>
        </div>
      </header>

      <div class="page-content">
        <!-- Stats Bar -->
        <div class="stats-bar animate-fade-up">
          <div class="stat-box">
            <div class="stat-box-value" id="totalProblems">0</div>
            <div class="stat-box-label">Total Problems</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-value" id="solvedProblems">0</div>
            <div class="stat-box-label">Solved</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-value" id="successRate">0%</div>
            <div class="stat-box-label">Success Rate</div>
          </div>
          <div class="stat-box">
            <div class="stat-box-value" id="submissions">0</div>
            <div class="stat-box-label">Submissions</div>
          </div>
        </div>

        <!-- Main Content -->
        <div class="practice-layout animate-fade-up delay-1">
          <!-- Filter Panel -->
          <aside class="filter-panel">
            <div class="filter-group">
              <label>Difficulty</label>
              <select id="difficultyFilter">
                <option value="">All Levels</option>
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </div>

            <div class="filter-group">
              <label>Topic</label>
              <select id="topicFilter">
                <option value="">All Topics</option>
                <option value="Arrays">Arrays</option>
                <option value="Strings">Strings</option>
                <option value="Recursion">Recursion</option>
                <option value="Sorting">Sorting</option>
                <option value="Searching">Searching</option>
                <option value="Linked List">Linked List</option>
                <option value="Stack">Stack</option>
                <option value="Queue">Queue</option>
                <option value="Trees">Trees</option>
                <option value="Graphs">Graphs</option>
                <option value="Dynamic Programming">Dynamic Programming</option>
              </select>
            </div>

            <div class="filter-group">
              <label>Show</label>
              <select id="statusFilter">
                <option value="">All Problems</option>
                <option value="solved">Solved Only</option>
                <option value="unsolved">Unsolved Only</option>
              </select>
            </div>

            <button class="action-btn" style="width: 100%; background: var(--secondary);" onclick="resetFilters()">
              Clear Filters
            </button>
          </aside>

          <!-- Problems List -->
          <section>
            <div class="problems-container" id="problemsList">
              <!-- Loading indicator -->
              <div style="text-align: center; padding: 2rem;">
                <i class="fa-solid fa-spinner" style="font-size: 2rem; animation: spin 1s linear infinite;"></i>
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script>
    let currentPage = 1;
    let currentDifficulty = '';
    let currentTopic = '';
    let currentStatus = '';
    let currentUserStats = {};

    // Load data on page load
    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([
        loadUserStats(),
        loadProblems()
      ]);

      // Event listeners for filters
      document.getElementById('difficultyFilter').addEventListener('change', (e) => {
        currentDifficulty = e.target.value;
        currentPage = 1;
        loadProblems();
      });

      document.getElementById('topicFilter').addEventListener('change', (e) => {
        currentTopic = e.target.value;
        currentPage = 1;
        loadProblems();
      });

      document.getElementById('statusFilter').addEventListener('change', (e) => {
        currentStatus = e.target.value;
        currentPage = 1;
        loadProblems();
      });

      // Logout handler
      document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('token');
        window.location.href = 'login.html';
      });
    });

    async function loadUserStats() {
      try {
        const response = await fetch('/api/coding/stats', {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('pc_token')}`
          }
        });

        if (response.ok) {
          currentUserStats = (await response.json()).data;
          document.getElementById('solvedProblems').textContent = currentUserStats.solvedProblems;
          document.getElementById('successRate').textContent = currentUserStats.successRate + '%';
          document.getElementById('submissions').textContent = currentUserStats.totalSubmissions;
        }
      } catch (err) {
        console.error('Error loading stats:', err);
      }
    }

    async function loadProblems() {
      try {
        let url = `/api/coding/questions?page=${currentPage}&limit=20`;
        if (currentDifficulty) url += `&difficulty=${currentDifficulty}`;
        if (currentTopic) url += `&topic=${currentTopic}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${localStorage.getItem('pc_token')}`
          }
        });

        if (!response.ok) throw new Error('Failed to fetch problems');

        const result = await response.json();
        const problems = result.data;

        document.getElementById('totalProblems').textContent = result.pagination.totalRecords;

        if (problems.length === 0) {
          document.getElementById('problemsList').innerHTML = `
            <div class="empty-state">
              <i class="fa-solid fa-inbox"></i>
              <p>No problems found. Try adjusting your filters.</p>
            </div>
          `;
          return;
        }

        const html = problems.map(problem => `
          <div class="problem-card" onclick="openProblem('${problem._id}')">
            <div class="problem-info">
              <h3>${problem.title}</h3>
              <p>${problem.description.substring(0, 100)}...</p>
              <div class="problem-meta">
                <span class="meta-badge ${problem.difficulty.toLowerCase()}">${problem.difficulty}</span>
                <span class="meta-badge">${problem.topic}</span>
              </div>
              <div class="problem-stats">
                <span>Submissions: ${problem.submissionCount || 0}</span>
                <span>Acceptance: ${problem.acceptanceRate || 0}%</span>
              </div>
            </div>
            <div class="problem-solvedstatus">
              ${currentUserStats.solvedProblems > 0 ? '<div class="solved-badge">✓ Solved</div>' : ''}
              <button class="action-btn" onclick="event.stopPropagation(); openProblem('${problem._id}')">
                Solve
              </button>
            </div>
          </div>
        `).join('');

        document.getElementById('problemsList').innerHTML = html;
      } catch (err) {
        console.error('Error loading problems:', err);
        showToast('Failed to load problems: ' + err.message, 'error');
      }
    }

    function resetFilters() {
      document.getElementById('difficultyFilter').value = '';
      document.getElementById('topicFilter').value = '';
      document.getElementById('statusFilter').value = '';
      currentDifficulty = '';
      currentTopic = '';
      currentStatus = '';
      currentPage = 1;
      loadProblems();
    }

    function openProblem(problemId) {
      window.location.href = `coding-editor.html?id=${problemId}`;
    }

    // Animation for spin
    const style = document.createElement('style');
    style.textContent = `
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
